# fetchPolicy: cache-and-network
query Bots {
  bots {
    id
    name
    avatarSeed
    frame
    status
    capitalAllocatedUsd
    recoveryModeActiveUntil
    recoveryModeApplied
    dailyMaxLoss
    dailyMaxGain
    riskAttitude
    tradeTempo
    combatPatience
    createdAt
    updatedAt
  }
}
