# fetchPolicy: cache-and-network
query Bot($id: ID!) {
  bot(id: $id) {
    id
    name
    avatarSeed
    frame
    status
    allocationPct
    dailyMaxLoss
    dailyMaxGain
    riskAttitude
    tradeTempo
    combatPatience
    marketAwareness {
      momentum
      meanReversion
      volatility
      trendFollowing
    }
    sectors
    exitStyle
    stopStyle
    subSectors
    customWatchlist
    exclusionList
    dividendPreference
    shortInterestSignal
    signalWeights {
      technicals
      news
      fundamentals
    }
    confidenceThreshold
    regimeAwareness
    earningsBehavior
    positionSizingMethod
    minRrRatio
    maxDrawdownProtectionPct
    recoveryMode
    sessionPreference
    dayAvoidance
    volatilityEnvPreference
    activePosition {
      id
      symbol
      qty
      avgEntryPrice
      status
      openedAt
    }
    proposals {
      id
      symbol
      side
      qty
      limitPrice
      rationaleText
      status
      expiresAt
      createdAt
    }
    agentBackground
    proposalCommunicationStyle
    winReaction
    lossReaction
    scanCapUsed
    scanCapRemaining
    botBrainConfig {
      brainType
      modelId
      provider
      keyPreview
    }
    createdAt
    updatedAt
  }
}
