# fetchPolicy: cache-and-network
query Bot($id: ID!) {
  bot(id: $id) {
    id
    name
    avatarSeed
    frame
    status
    allocationPct
    dailyMaxLoss
    dailyMaxGain
    riskAttitude
    tradeTempo
    combatPatience
    marketAwareness {
      momentum
      meanReversion
      volatility
      trendFollowing
    }
    sectors
    exitStyle
    stopStyle
    activePosition {
      id
      symbol
      qty
      avgEntryPrice
      status
      openedAt
    }
    proposals {
      id
      symbol
      side
      qty
      limitPrice
      rationaleText
      status
      expiresAt
      createdAt
    }
    scanCapUsed
    scanCapRemaining
    botBrainConfig {
      brainType
      modelId
      provider
      keyPreview
    }
    createdAt
    updatedAt
  }
}
