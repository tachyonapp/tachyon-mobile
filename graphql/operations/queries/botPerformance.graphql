query BotPerformance($id: ID!) {
  botPerformance(id: $id) {
    totalRealizedPnl
    returnOnAllocatedCapitalPct
    winCount
    lossCount
    winRatePct
    avgGainPerWin
    avgLossPerLoss
    profitFactor
    largestSingleWin
    largestSingleLoss
    avgHoldDurationHours
    daysActive
    totalProposalsGenerated
    totalProposalsApproved
    approvalRatePct
    skipRatePct
    pnlTimeSeries {
      date
      cumulativePnl
    }
  }
}
